{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FLOWZEN v2.0{% endblock %}</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" href="{% static 'images/flowzen_logo.png' %}">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <style>
        /* GLOBAL VISUAL LANGUAGE (Style-6 Production) */
        :root {
            --bg-main: #F6F7F9;
            --card-bg: #FFFFFF;
            --text-main: #1F2937;
            --text-muted: #6B7280;
            --font-main: 'Outfit', sans-serif;
            --primary-gradient: linear-gradient(90deg, #7C5CFF, #FF6A3D);

            /* Shadows match Style-6 Spec */
            --shadow-subtle: 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-card: 0 10px 25px rgba(0, 0, 0, 0.05);
            --shadow-hero: 0 18px 40px rgba(0, 0, 0, 0.18);

            /* Global Easing */
            --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Reset & Base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        html,
        body {
            height: 100%;
            width: 100vw;
            background-color: var(--bg-main) !important;
            color: var(--text-main);
            font-family: var(--font-main);
            overflow: hidden !important;
            /* Global Lock */
            margin: 0;
        }

        /* GLOBAL LAYOUT SYSTEM */
        .dashboard-layout,
        .dashboard-wrapper,
        .dashboard-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* MAIN SROLLABLE AREA */
        .main-content,
        .dashboard-main,
        .debug-page {
            flex: 1;
            height: 100vh;
            overflow-y: auto;
            /* Scroll enabled here */
            padding: 40px;
            margin-left: 260px;
            /* Sidebar Offset */
            scrollbar-width: none;
            /* Firefox Hidden */
            position: relative;
        }

        /* Hide Scrollbar (Chrome/Safari) */
        .main-content::-webkit-scrollbar,
        .dashboard-main::-webkit-scrollbar,
        .debug-page::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }

        /* Sidebar Fixed Shim */
        .sidebar {
            height: 100vh;
            overflow-y: auto;
            flex-shrink: 0;
        }

        /* Utility */
        .hover-lift {
            transition: transform 0.2s var(--ease-smooth), box-shadow 0.2s ease;
        }

        .hover-lift:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
        }

        /* Smooth Fade In */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .fade-in {
            animation: fadeIn 0.5s var(--ease-smooth) forwards;
        }

        /* Common Elements */
        button,
        input {
            font-family: var(--font-main);
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>

<body class="style-6-theme">

    <!-- Global Error Modal (Preserved Functionality) -->
    <div id="global-error-modal"
        style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); backdrop-filter:blur(5px); z-index:99999; align-items:center; justify-content:center; padding: 20px;">
        <div
            style="max-width:600px; width:100%; padding:32px; border-radius:18px; background:#FFFFFF; position:relative; box-shadow: 0 20px 50px rgba(0,0,0,0.2);">
            <button onclick="document.getElementById('global-error-modal').style.display='none'"
                style="position:absolute; top:20px; right:20px; background:none; border:none; color:#9CA3AF; font-size:1.5rem; cursor:pointer;">&times;</button>
            <h2 id="error-modal-title" style="margin:0 0 12px 0; font-size:1.25rem; font-weight: 700; color: #EF4444;">
                System Error</h2>
            <div id="error-modal-body"
                style="background:#F9FAFB; padding:16px; border-radius:12px; font-family:monospace; font-size:0.85rem; color:#374151; max-height:300px; overflow-y:auto; line-height:1.5;">
            </div>
            <div style="margin-top:24px; text-align:right;">
                <button onclick="window.location.reload()"
                    style="background:#F3F4F6; color:#374151; border:none; padding:10px 20px; border-radius:8px; font-weight:600; cursor:pointer;">Reload</button>
            </div>
        </div>
    </div>

    <!-- Main Content Injection -->
    {% block content %}{% endblock %}



    <!-- Toast Notifications Container -->
    <div id="toast-container"
        style="position: fixed; top: 24px; right: 24px; z-index: 10000; display: flex; flex-direction: column; gap: 12px; pointer-events: none;">
    </div>

    <style>

    </style>

    <script>

        // End of main script logic
    </script>

    <!-- Global Toast System -->
    <script src="/static/js/toast.js?v=1"></script>

    {% block extra_js %}{% endblock %}
</body>

</html>
