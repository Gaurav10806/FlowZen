{% extends "base.html" %}
{% load static %}

{% block title %}Forgot Password{% endblock %}

{% block extra_css %}
<style>
    .auth-bg {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: url('{% static "img/auth-bg.jpg" %}') no-repeat center center/cover;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-bg">
    <div class="glass-panel"
        style="max-width: 400px; width: 100%; padding: 40px; border-radius: 20px; backdrop-filter: blur(20px); background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1);">
        <div style="text-align: center; margin-bottom: 30px;">
            <i class="fas fa-lock-open" style="font-size: 40px; color: #8b5cf6; margin-bottom: 15px;"></i>
            <h2 style="margin: 0; font-size: 1.8rem; font-weight: 700;">Account Recovery</h2>
            <p style="color: #94a3b8; font-size: 0.9rem;">Enter your email to receive a reset link.</p>
        </div>

        <form method="post" action="{% url 'forgot-password' %}">
            {% csrf_token %}
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: #cbd5e1;">Email
                    Address</label>
                <input type="email" name="email" required placeholder="name@company.com"
                    style="width: 100%; padding: 12px; background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; color: white; outline: none; transition: 0.3s;"
                    onfocus="this.style.borderColor='#8b5cf6'; this.style.backgroundColor='rgba(0,0,0,0.4)';"
                    onblur="this.style.borderColor='rgba(255,255,255,0.1)'; this.style.backgroundColor='rgba(0,0,0,0.2)';">
            </div>

            <button type="submit"
                style="width: 100%; padding: 14px; background: linear-gradient(135deg, #8b5cf6 0%, #3b82f6 100%); border: none; border-radius: 8px; color: white; font-weight: 600; font-size: 1rem; cursor: pointer; transition: transform 0.2s;"
                onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='translateY(0)'">
                Send Reset Link
            </button>
        </form>

        <div style="text-align: center; margin-top: 25px;">
            <a href="/login/" style="color: #94a3b8; text-decoration: none; font-size: 0.9rem; transition: 0.3s;"
                onmouseover="this.style.color='white'" onmouseout="this.style.color='#94a3b8'">
                <i class="fas fa-arrow-left"></i> Back to Login
            </a>
        </div>
    </div>
</div>
{% endblock %}
