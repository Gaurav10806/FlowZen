{% block extra_js %}
<script src="{% static 'js/toast.js' %}"></script>
<script>
    // --- GLOBAL STATE ---
    const API_BASE = '/api/v1/credentials/'; // Keeping v1 as per user partial constraints, or ensuring backend supports it. Checked urls.py, it expects /api/ but frontend used v1. I'll use /api/v1/credentials/ to match user prompt requirement "POST /api/v1/credentials/" exactly.

    let userCredentials = [];

    // --- UTILS ---
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    function copyToClipboard(elementId) {
        const copyText = document.getElementById(elementId);
        if (copyText) {
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(copyText.value);
            if (window.showToast) window.showToast('Copied to clipboard', 'success');
        }
    }

    // --- MODAL LOGIC ---
    function openModal(modalId) {
        const modal = document.getElementById(modalId);
        if (modal) {
            modal.style.display = 'flex';
            void modal.offsetWidth; // Force reflow
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }
    }

    function closeModal(id) {
        const modal = document.getElementById(id);
        if (modal) {
            modal.classList.remove('active');
            setTimeout(() => {
                modal.style.display = 'none';
            }, 300);
            document.body.style.overflow = '';
        }
    }

    // --- UNIFIED API LOGIC ---

    async function saveCredentialGeneric(provider, name, data, credentialId = null) {
        // Unified Save Endpoint
        const method = credentialId ? 'PUT' : 'POST';
        // Note: backend expects /api/v1/credentials/ for list/create, and /api/v1/credentials/{id}/ for update
        const url = credentialId ? `${API_BASE}${credentialId}/` : API_BASE;

        // Payload Construction
        // User prompt validation says: { "name": "...", "provider": "...", "data": { ... } }
        // BUT backend serializer (Step 1157) expects "encrypted_data", "type". "provider" is also a field.
        // We will send BOTH to be safe: data (for prompt compliance if patched) and encrypted_data (for current backend).
        // Actually, to avoid 400 errors with strict validation, we will map standard "data" to "encrypted_data" 
        // and "provider" to "type" as required by the backend view we saw.
        // We will send 'type' because backend filters/validates on 'type'.
        
        const payload = {
            name: name,
            type: provider,      // Backend field
            provider: provider,  // Prompt field
            encrypted_data: data // Backend field
        };

        try {
            const res = await fetch(url, {
                method: method,
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify(payload)
            });

            const result = await res.json();

            if (res.ok) {
                if (window.showToast) window.showToast(`${name} saved successfully! 🔐`, 'success');
                
                // Update UI immediately without full reload if possible
                updateCardStatus(provider, 'connected');
                
                // Close modal
                const modal = document.querySelector('.modal-backdrop.active');
                if (modal) closeModal(modal.id);

                // Refresh list in background to ensure IDs are synced
                await initCredentials();
                
                return result;
            } else {
                const errorMsg = result.errors ? JSON.stringify(result.errors) : (result.message || result.error || 'Unknown error');
                if (window.showToast) window.showToast(`Save failed: ${errorMsg}`, 'error');
                return null;
            }
        } catch (e) {
            console.error(e);
            if (window.showToast) window.showToast(`Network Error: ${e.message}`, 'error');
            return null;
        }
    }

    async function testConnectionGeneric(provider, data) {
        // Unified Test Endpoint: POST /api/v1/credentials/test_connectivity/ (aligned with viewset)
        const btn = document.querySelector('.modal-backdrop.active .btn-test');
        let originalText = "";
        if (btn) {
            originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Testing...';
            btn.disabled = true;
        }

        try {
            // Backend ViewSet action 'test_connectivity' is usually at .../test_connectivity/
            const res = await fetch(`${API_BASE}test_connectivity/`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({
                    provider: provider,
                    data: data
                })
            });

            const result = await res.json();

            if (res.ok && result.success) {
                if (window.showToast) window.showToast(result.message || "Connection Test Passed! ✅", 'success');
                return true;
            } else {
                if (window.showToast) window.showToast(result.error || "Test failed", 'error');
                return false;
            }
        } catch (e) {
            if (window.showToast) window.showToast(`Test execution failed: ${e.message}`, 'error');
            return false;
        } finally {
            if (btn) {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
    }

    // --- UI HELPERS ---

    function updateCardStatus(provider, status) {
        // Map providers to DOM IDs
        let domId = `status-${provider}`;
        if (provider === 'gmail_oauth' || provider === 'gmail') domId = 'status-gmail';
        if (provider === 'google_calendar') domId = 'status-google_calendar';
        if (provider === 'ollama' || provider === 'ai_offline') domId = 'status-ai_offline';
        if (provider === 'whatsapp') domId = 'status-meta_whatsapp';
        // Note: 'telegram_bot' usually maps to 'status-telegram_bot'

        const pill = document.getElementById(domId);
        if (pill) {
            if (status === 'connected') {
                pill.innerHTML = `<span class="dot" style="background:#10B981"></span> Connected`;
                pill.className = "status-pill text-green-600"; // Ensure color
                
                // Unlock connect buttons if needed
                if (provider === 'gmail_oauth' || provider === 'gmail') {
                    const btn = document.getElementById('btn-connect-gmail');
                    if (btn) {
                        btn.disabled = false;
                        btn.classList.remove('opacity-60', 'cursor-not-allowed');
                    }
                }
                if (provider === 'google_calendar') {
                   const btn = document.getElementById('btn-connect-gcal');
                   if (btn) {
                       btn.disabled = false;
                       btn.classList.remove('opacity-60', 'cursor-not-allowed');
                   }
                }
            } else {
                pill.innerHTML = `<span class="dot" style="background:#D1D5DB"></span> Not Configured`;
                pill.className = "status-pill text-gray-400";
            }
        }
    }

    // --- SPECIFIC PROVIDER HANDLERS ---

    // 1. SMTP
    function openSMTPModal() {
        const cred = userCredentials.find(c => c.type === 'smtp');
        document.getElementById('smtp-credential-id').value = cred ? cred.id : '';
        const data = cred ? cred.encrypted_data || {} : {};
        document.getElementById('smtp-host').value = data.host || '';
        document.getElementById('smtp-port').value = data.port || '587';
        document.getElementById('smtp-user').value = data.username || '';
        document.getElementById('smtp-pass').value = ''; 
        openModal('smtp-modal');
    }

    function saveSMTP() {
        const data = {
            host: document.getElementById('smtp-host').value,
            port: document.getElementById('smtp-port').value,
            username: document.getElementById('smtp-user').value,
            password: document.getElementById('smtp-pass').value
        };
        const id = document.getElementById('smtp-credential-id').value;
        saveCredentialGeneric('smtp', 'SMTP Server', data, id);
    }

    function testSMTP() {
        const data = {
            host: document.getElementById('smtp-host').value,
            port: document.getElementById('smtp-port').value,
            username: document.getElementById('smtp-user').value,
            password: document.getElementById('smtp-pass').value
        };
        testConnectionGeneric('smtp', data);
    }

    // 2. Gmail
    function openGmailModal() {
        const cred = userCredentials.find(c => c.type === 'gmail_oauth' || c.type === 'gmail');
        document.getElementById('gmail-credential-id').value = cred ? cred.id : '';
        const data = cred ? cred.encrypted_data || {} : {};
        document.getElementById('gmail-client-id').value = cred ? (cred.client_id || data.client_id || '') : '';
        document.getElementById('gmail-client-secret').value = cred ? (cred.client_secret || data.client_secret || '') : '';
        
        const connectBtn = document.getElementById('btn-connect-gmail');
        if (cred) {
            connectBtn.disabled = false;
            connectBtn.classList.remove('opacity-60', 'cursor-not-allowed');
        } else {
            connectBtn.disabled = true;
            connectBtn.classList.add('opacity-60', 'cursor-not-allowed');
        }
        openModal('gmail-modal');
    }

    function saveGmailCredentials() {
        const data = {
            client_id: document.getElementById('gmail-client-id').value,
            client_secret: document.getElementById('gmail-client-secret').value
        };
        const id = document.getElementById('gmail-credential-id').value;
        // Use 'gmail_oauth' as unified type
        saveCredentialGeneric('gmail_oauth', 'Gmail OAuth', data, id);
    }

    async function connectGmail(credentialId) {
        if (!credentialId) {
            // Try to find if user just saved
            credentialId = document.getElementById('gmail-credential-id').value;
        }
        if (!credentialId) {
            if (window.showToast) window.showToast("Please save credentials first!", 'error');
            return;
        }

        try {
            const res = await fetch('/api/v1/gmail-oauth/start/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
                body: JSON.stringify({ credential_id: credentialId })
            });
            const result = await res.json();
            if (res.ok && result.url) {
                window.location.href = result.url;
            } else {
                if (window.showToast) window.showToast(result.error || "Failed to start OAuth", 'error');
            }
        } catch(e) { console.error(e); }
    }

    function testGmail() {
        // Test doesn't really work for OAuth without token, but we can verify client_id syntax?
        // Actually generic test might check token status if saved
        const data = {
             client_id: document.getElementById('gmail-client-id').value
        };
        testConnectionGeneric('gmail_oauth', data);
    }

    // 3. Telegram
    function openTelegramModal() {
        const cred = userCredentials.find(c => c.type === 'telegram_bot');
        const id = cred ? cred.id : '';
        document.getElementById('telegram-credential-id').value = id;
        const data = cred ? cred.encrypted_data || {} : {};
        document.getElementById('telegram-name').value = cred ? cred.name : 'My Telegram Bot';
        document.getElementById('telegram-token').value = data.bot_token || ''; // Decrypted logic in backend handles this

        // Auto-fill Webhook URL
        const webhookUrl = `${window.location.origin}/api/webhooks/telegram/`;
        const webhookField = document.getElementById('telegram-webhook-url');
        if (webhookField) {
            // User can override, but we suggest default
            webhookField.value = data.webhook_url || webhookUrl;
        }

        openModal('telegram-modal');
    }

    function saveTelegram() {
        const data = {
            bot_token: document.getElementById('telegram-token').value,
            webhook_url: document.getElementById('telegram-webhook-url').value
        };
        const name = document.getElementById('telegram-name').value;
        const id = document.getElementById('telegram-credential-id').value;
        saveCredentialGeneric('telegram_bot', name, data, id);
    }

    function testTelegram() {
        const data = {
            bot_token: document.getElementById('telegram-token').value
        };
        testConnectionGeneric('telegram', data);
    }

    // 4. Ollama / AI Offline
    function openOfflineAIModal() {
        const cred = userCredentials.find(c => c.type === 'ai_offline');
        document.getElementById('offline-credential-id').value = cred ? cred.id : '';
        const data = cred ? cred.encrypted_data || {} : {};
        document.getElementById('offline-name').value = cred ? cred.name : 'Local Ollama';
        document.getElementById('offline-url').value = data.base_url || 'http://localhost:11434';
        document.getElementById('offline-default-model').value = data.default_model || 'llama3:8b';
        openModal('offline-ai-modal');
    }

    function saveOfflineAI() {
        const data = {
            base_url: document.getElementById('offline-url').value,
            default_model: document.getElementById('offline-default-model').value,
            api_key: document.getElementById('offline-backup-key').value
        };
        const name = document.getElementById('offline-name').value;
        const id = document.getElementById('offline-credential-id').value;
        saveCredentialGeneric('ai_offline', name, data, id);
    }

    function testOfflineAI() {
        const data = {
            base_url: document.getElementById('offline-url').value
        };
        testConnectionGeneric('ollama', data);
    }

    // 5. WhatsApp
    function openWhatsAppModal() {
        const cred = userCredentials.find(c => c.type === 'whatsapp');
        document.getElementById('whatsapp-credential-id').value = cred ? cred.id : '';
        const data = cred ? cred.encrypted_data || {} : {};
        document.getElementById('whatsapp-name').value = cred ? cred.name : 'WhatsApp Business';
        document.getElementById('whatsapp-phone-id').value = data.phone_id || '';
        document.getElementById('whatsapp-business-id').value = data.business_id || '';
        document.getElementById('whatsapp-token').value = data.access_token || '';
        document.getElementById('whatsapp-verify-token').value = data.verify_token || '';
        openModal('whatsapp-modal');
    }

    function saveWhatsApp() {
        const data = {
            phone_id: document.getElementById('whatsapp-phone-id').value,
            business_id: document.getElementById('whatsapp-business-id').value,
            access_token: document.getElementById('whatsapp-token').value,
            verify_token: document.getElementById('whatsapp-verify-token').value
        };
        const name = document.getElementById('whatsapp-name').value;
        const id = document.getElementById('whatsapp-credential-id').value;
        saveCredentialGeneric('whatsapp', name, data, id);
    }

    function testWhatsApp() {
        const data = {
            phone_id: document.getElementById('whatsapp-phone-id').value,
            access_token: document.getElementById('whatsapp-token').value
        };
        testConnectionGeneric('whatsapp', data);
    }

    // 6. Google Calendar
    function openGoogleCalendarModal() {
        const cred = userCredentials.find(c => c.type === 'google_calendar');
        document.getElementById('gcal-credential-id').value = cred ? cred.id : '';
        const data = cred ? cred.encrypted_data || {} : {};
        document.getElementById('gcal-client-id').value = cred ? (cred.client_id || data.client_id || '') : '';
        document.getElementById('gcal-client-secret').value = cred ? (cred.client_secret || data.client_secret || '') : '';
        
        const connectBtn = document.getElementById('btn-connect-gcal');
         if (cred) {
            connectBtn.disabled = false;
            connectBtn.classList.remove('opacity-60', 'cursor-not-allowed');
        } else {
            connectBtn.disabled = true;
            connectBtn.classList.add('opacity-60', 'cursor-not-allowed');
        }
        openModal('google-calendar-modal');
    }

    function saveGoogleCalendarCredentials() {
        const data = {
            client_id: document.getElementById('gcal-client-id').value,
            client_secret: document.getElementById('gcal-client-secret').value
        };
        const id = document.getElementById('gcal-credential-id').value;
        saveCredentialGeneric('google_calendar', 'Google Calendar Config', data, id);
    }
    
    async function connectGoogleCalendar(credentialId) {
         if (!credentialId) credentialId = document.getElementById('gcal-credential-id').value;
         if (!credentialId) {
             if (window.showToast) window.showToast("Save config first!", 'error');
             return;
         }
         try {
             const res = await fetch('/api/v1/google-calendar-oauth/start/', {
                 method: 'POST',
                 headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
                 body: JSON.stringify({ credential_id: credentialId })
             });
             const result = await res.json();
             if (res.ok && result.url) {
                 window.location.href = result.url;
             } else {
                 if (window.showToast) window.showToast(result.error || "Connect failed", 'error');
             }
         } catch(e) { console.error(e); }
    }
    
    function testGoogleCalendar() {
        const data = {
            client_id: document.getElementById('gcal-client-id').value
        };
        testConnectionGeneric('google_calendar', data);
    }

    // 7. API Key (General)
    function openKeyModal() {
        const cred = userCredentials.find(c => c.type === 'api_key');
        document.getElementById('key-credential-id').value = cred ? cred.id : '';
        // keys usually hidden/encrypted, might not populate
        document.getElementById('key-name').value = cred ? cred.name : '';
        document.getElementById('key-value').value = ''; 
        openModal('key-modal');
    }
    
    function saveKey() {
        const data = {
            api_key: document.getElementById('key-value').value
        };
        const name = document.getElementById('key-name').value;
        const id = document.getElementById('key-credential-id').value;
        saveCredentialGeneric('api_key', name, data, id);
    }


    // --- INIT ---

    async function initCredentials() {
        try {
            const res = await fetch(API_BASE);
            const data = await res.json();
            userCredentials = data.results || (Array.isArray(data) ? data : []);
            
            // Re-render status
            userCredentials.forEach(cred => {
                // If it exists in list, it is 'active'. If it has tokens, it is 'connected'.
                // Simplification for UI check
                updateCardStatus(cred.type, 'connected'); 
            });
            
            // Special count for keys means we manually update that specific element
            const keyCount = userCredentials.filter(c => c.type === 'api_key').length;
             const keyStatus = document.getElementById('status-api_key');
             if (keyStatus && keyCount > 0) {
                 keyStatus.innerHTML = `<span class="dot" style="background:#10B981"></span> ${keyCount} Keys`;
             }

        } catch (e) {
            console.error("Failed to load credentials", e);
            if (window.showToast) window.showToast("Failed to load vault status", 'error');
        }
    }

    // Run
    document.addEventListener('DOMContentLoaded', initCredentials);

</script>
{% endblock %}
