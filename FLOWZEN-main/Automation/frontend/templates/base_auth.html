{% extends "base.html" %}
{% load static %}

{% block title %}Sign In - FLOWZEN{% endblock %}

{% block extra_css %}
<style>
    body {
        overflow: hidden;
        /* Prevent scroll on auth pages */
    }

    .auth-container {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100vw;
        position: relative;
        z-index: 10;
    }

    .auth-glass-panel {
        background: rgba(13, 13, 17, 0.6);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        padding: 3rem;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        animation: float-up 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes float-up {
        from {
            transform: translateY(40px);
            opacity: 0;
        }

        to {
            transform: translateY(0);
            opacity: 1;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    {% block auth_content %}{% endblock %}
</div>
{% endblock %}
