{% extends "base.html" %}

{% block content %}
<div class="dashboard-container" style="max-width: 1000px; margin: 0 auto; padding: 40px 20px;">

    <!-- HEADER -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <div>
            <h1 style="font-size: 28px; font-weight: 700; color: #111827; margin-bottom: 8px;">Notifications</h1>
            <p style="color: #6B7280; font-size: 15px;">All workflow events, alerts, and system updates.</p>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn-ghost" onclick="markAllRead()"><i class="fas fa-check-double"></i> Mark all read</button>
            <a href="/notifications/settings/" class="btn-secondary"><i class="fas fa-cog"></i> Settings</a>
        </div>
    </div>

    <!-- MAIN GRID -->
    <div style="display: grid; grid-template-columns: 240px 1fr; gap: 40px;">

        <!-- SIDEBAR FILTERS -->
        <aside>
            <div
                style="background: white; border-radius: 16px; padding: 12px; border: 1px solid #E5E7EB; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);">
                <div class="filter-item active" onclick="filterType('all', this)"><i class="fas fa-inbox"></i> All
                    Notifications</div>
                <div class="filter-item" onclick="filterType('error', this)"><i class="fas fa-exclamation-circle"
                        style="color:#EF4444;"></i> Errors</div>
                <div class="filter-item" onclick="filterType('success', this)"><i class="fas fa-check-circle"
                        style="color:#10B981;"></i> Workflow Runs</div>
                <div class="filter-item" onclick="filterType('warning', this)"><i class="fas fa-shield-alt"
                        style="color:#F59E0B;"></i> Security</div>
                <div class="filter-item" onclick="filterType('info', this)"><i class="fas fa-info-circle"
                        style="color:#3B82F6;"></i> System</div>
            </div>
        </aside>

        <!-- NOTIFICATION LIST -->
        <div id="notification-list" style="display: flex; flex-direction: column; gap: 16px;">
            <!-- Loading State -->
            <div style="text-align: center; padding: 40px; color: #9CA3AF;">
                <i class="fas fa-spinner fa-spin" style="font-size: 24px;"></i>
                <p style="margin-top: 10px;">Loading notifications...</p>
            </div>
        </div>
    </div>
</div>

<style>
    .filter-item {
        padding: 10px 16px;
        border-radius: 8px;
        cursor: pointer;
        color: #4B5563;
        font-weight: 500;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 10px;
        transition: all 0.2s;
        margin-bottom: 4px;
    }

    .filter-item:hover {
        background: #F3F4F6;
    }

    .filter-item.active {
        background: #F3F4F6;
        color: #111827;
        font-weight: 600;
    }

    .notif-card {
        background: white;
        border-radius: 12px;
        padding: 20px;
        border: 1px solid #E5E7EB;
        display: flex;
        gap: 16px;
        transition: all 0.2s;
        position: relative;
        overflow: hidden;
    }

    .notif-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.05);
        border-color: #D1D5DB;
    }

    .notif-unread {
        border-left: 4px solid #7C5CFF;
        background: linear-gradient(90deg, rgba(124, 92, 255, 0.04), transparent);
    }

    .notif-unread::after {
        content: '';
        position: absolute;
        top: 20px;
        right: 20px;
        width: 8px;
        height: 8px;
        background: #EF4444;
        border-radius: 50%;
    }

    .notif-icon {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        font-size: 18px;
    }

    .icon-error {
        background: #FEF2F2;
        color: #DC2626;
    }

    .icon-success {
        background: #ECFDF5;
        color: #059669;
    }

    .icon-warning {
        background: #FFFBEB;
        color: #D97706;
    }

    .icon-info {
        background: #EFF6FF;
        color: #2563EB;
    }
</style>

<script>
    let currentFilter = 'all';

    document.addEventListener('DOMContentLoaded', loadNotifications);

    async function loadNotifications() {
        const list = document.getElementById('notification-list');
        try {
            const res = await fetch('/api/notifications/list/');
            const data = await res.json();

            if (data.results.length === 0) {
                list.innerHTML = `<div style="text-align:center; padding:60px; color:#9CA3AF;">
                    <i class="fas fa-bell-slash" style="font-size:32px; margin-bottom:16px; opacity:0.5;"></i>
                    <p>No notifications found</p>
                </div>`;
                return;
            }

            renderList(data.results);
        } catch (e) {
            console.error(e);
            list.innerHTML = `<div style="color:red; text-align:center;">Failed to load notifications</div>`;
        }
    }

    function renderList(notifications) {
        const list = document.getElementById('notification-list');
        const filtered = currentFilter === 'all' ? notifications : notifications.filter(n => n.type === currentFilter);

        list.innerHTML = filtered.map(n => `
            <div class="notif-card ${n.is_read ? '' : 'notif-unread'}" onclick="openNotif('${n.id}', '${n.link || ''}')">
                <div class="notif-icon icon-${n.type}">
                    <i class="fas fa-${getIcon(n.type)}"></i>
                </div>
                <div style="flex:1;">
                    <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
                        <span style="font-weight:600; color:#111827; font-size:15px;">${n.title}</span>
                        <span style="font-size:12px; color:#9CA3AF;">${formatTime(n.created_at)}</span>
                    </div>
                    <p style="color:#4B5563; font-size:14px; margin:0; line-height:1.5;">${n.message}</p>
                    ${n.link ? `<a href="${n.link}" style="display:inline-block; margin-top:8px; font-size:13px; color:#7C5CFF; font-weight:500;">View Details →</a>` : ''}
                </div>
            </div>
        `).join('');
    }

    function getIcon(type) {
        if (type === 'error') return 'exclamation-triangle';
        if (type === 'success') return 'check';
        if (type === 'warning') return 'shield-alt';
        return 'info';
    }

    function formatTime(iso) {
        const date = new Date(iso);
        const diff = (new Date() - date) / 1000;
        if (diff < 60) return 'Just now';
        if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
        if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
        return Math.floor(diff / 86400) + 'd ago';
    }

    function filterType(type, el) {
        currentFilter = type;
        document.querySelectorAll('.filter-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        loadNotifications(); // Reload/Re-render (Ideally cache)
    }

    async function markAllRead() {
        await fetch('/api/notifications/list/mark_all_read/', { method: 'POST', headers: { 'X-CSRFToken': getCookie('csrftoken') } });
        loadNotifications();
    }

    async function openNotif(id, link) {
        await fetch(`/api/notifications/list/${id}/mark_read/`, { method: 'POST', headers: { 'X-CSRFToken': getCookie('csrftoken') } });
        if (link) window.location.href = link;
        else loadNotifications();
    }

    function getCookie(name) {
        let value = "; " + document.cookie;
        let parts = value.split("; " + name + "=");
        if (parts.length == 2) return parts.pop().split(";").shift();
    }
</script>
{% endblock %}
