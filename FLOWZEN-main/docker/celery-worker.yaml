apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: workflow-automation
spec:
  replicas: 5
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      containers:
      - name: celery-worker
        image: workflow-automation/django:latest
        command: ['celery']
        args:
        - '-A'
        - 'project'
        - 'worker'
        - '--loglevel=info'
        - '--concurrency=4'
        - '--prefetch-multiplier=1'
        - '--max-tasks-per-child=1000'
        - '--time-limit=3600'
        - '--soft-time-limit=3300'
        envFrom:
        - configMapRef:
            name: workflow-automation-config
        - secretRef:
            name: workflow-automation-secrets
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1"
        livenessProbe:
          exec:
            command:
            - celery
            - -A
            - project
            - inspect
            - ping
          initialDelaySeconds: 30
          periodSeconds: 30
        volumeMounts:
        - name: media-storage
          mountPath: /app/media
      volumes:
      - name: media-storage
        persistentVolumeClaim:
          claimName: media-pvc
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: celery-worker-hpa
  namespace: workflow-automation
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: celery-worker
  minReplicas: 5
  maxReplicas: 50
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 85
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60