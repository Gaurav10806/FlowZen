apiVersion: v1
kind: Namespace
metadata:
  name: workflow-automation
  labels:
    name: workflow-automation
    tier: production
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: workflow-automation-quota
  namespace: workflow-automation
spec:
  hard:
    requests.cpu: "10"
    requests.memory: 20Gi
    limits.cpu: "20"
    limits.memory: 40Gi
    persistentvolumeclaims: "10"
    services: "20"
    secrets: "20"
    configmaps: "20"