apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
  namespace: workflow-automation
spec:
  replicas: 1  # Only one beat scheduler needed
  selector:
    matchLabels:
      app: celery-beat
  template:
    metadata:
      labels:
        app: celery-beat
    spec:
      containers:
      - name: celery-beat
        image: workflow-automation/django:latest
        command: ['celery']
        args:
        - '-A'
        - 'project'
        - 'beat'
        - '--loglevel=info'
        - '--scheduler=django_celery_beat.schedulers:DatabaseScheduler'
        envFrom:
        - configMapRef:
            name: workflow-automation-config
        - secretRef:
            name: workflow-automation-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
        livenessProbe:
          exec:
            command:
            - pgrep
            - -f
            - "celery.*beat"
          initialDelaySeconds: 30
          periodSeconds: 30
        volumeMounts:
        - name: beat-storage
          mountPath: /app/celerybeat-schedule
      volumes:
      - name: beat-storage
        persistentVolumeClaim:
          claimName: beat-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: beat-pvc
  namespace: workflow-automation
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: standard