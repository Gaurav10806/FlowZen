apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: workflow-automation-ingress
  namespace: workflow-automation
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/rate-limit: "1000"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  tls:
  - hosts:
    - api.workflow-automation.com
    - app.workflow-automation.com
    - admin.workflow-automation.com
    secretName: workflow-automation-tls
  rules:
  - host: api.workflow-automation.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: django-api-service
            port:
              number: 8000
  - host: app.workflow-automation.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
  - host: admin.workflow-automation.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: admin-dashboard-service
            port:
              number: 80